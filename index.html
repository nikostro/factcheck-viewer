<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Fact-check viewer</title>
  <style>
    :root{
      --bg:#f8fafc; --panel:#ffffff; --text:#0f172a; --muted:#64748b; --border:#e2e8f0;
      --green-bg:#d1fae5; --green-soft:#ecfdf5; --green-text:#065f46; --green-pill:#a7f3d0;
      --yellow-bg:#fde68a; --yellow-soft:#fffbeb; --yellow-text:#92400e; --yellow-pill:#fde68a;
      --red-bg:#fecdd3; --red-soft:#fff1f2; --red-text:#9f1239; --red-pill:#fecdd3;
      --blue-bg:#bae6fd; --blue-soft:#f0f9ff; --blue-text:#0c4a6e; --blue-pill:#bae6fd;
      --purple-bg:#ddd6fe; --purple-soft:#f5f3ff; --purple-text:#5b21b6; --purple-pill:#ddd6fe;
      --shadow:0 1px 2px rgba(15,23,42,.06),0 8px 24px rgba(15,23,42,.06);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    .page{max-width:1280px;margin:0 auto;padding:32px 16px}
    .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
    .hero{overflow:hidden;margin-bottom:32px}
    .hero-top{padding:24px 24px;border-bottom:1px solid #f1f5f9;background:linear-gradient(135deg,#fff,#f8fafc,#f1f5f9)}
    .hero-grid{display:flex;gap:16px;justify-content:space-between;align-items:end;flex-wrap:wrap}
    .badge-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:24px}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--muted);font-size:12px;font-weight:600}
    h1{margin:0;font-size:42px;line-height:1.1}
    h2{margin:0;font-size:24px;line-height:1.2}
    h3{margin:0;font-size:30px;line-height:1.2}
    p.sub{margin:12px 0 0;max-width:700px;color:var(--muted);line-height:1.6}
    .metrics{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;min-width:320px}
    .metric{padding:16px;border-radius:20px;border:1px solid var(--border)}
    .metric .num{font-size:32px;font-weight:700}
    .metric .label{font-size:14px;color:var(--muted);margin-top:6px}
    .layout{display:grid;grid-template-columns:calc(var(--split-pct,50) * 1%) 8px 1fr;gap:16px;align-items:stretch}
    .resizer{cursor:col-resize;background:transparent;border-radius:4px;position:relative;touch-action:none;align-self:stretch}
    .resizer::before{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:4px;height:48px;border-radius:4px;background:var(--border);transition:background .15s}
    .resizer:hover::before,.resizer.dragging::before{background:#94a3b8}
    body.resizing{cursor:col-resize;user-select:none}
    body.resizing *{user-select:none !important}
    .section{padding:24px}
    .muted{color:var(--muted)}
    .passage-box{border:1px solid #f1f5f9;background:#f8fafcb3;border-radius:24px;padding:20px}
    .passage{font-size:18px;line-height:1.9;color:#1e293b}
    .claim-highlight{display:inline;border:none;border-radius:10px;padding:2px 6px;font:inherit;font-weight:600;cursor:pointer;text-decoration:underline;text-decoration-color:transparent;transition:.15s}
    .claim-highlight:hover{text-decoration-color:currentColor}
    .search-wrap{position:relative;margin:0 0 20px}
    .search{width:100%;padding:14px 14px 14px 40px;border-radius:18px;border:1px solid var(--border);background:#f8fafc;outline:none;font-size:14px}
    .search:focus{background:#fff;box-shadow:0 0 0 4px #e2e8f0}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);opacity:.5}
    .claims-list{max-height:65vh;overflow:auto;padding-right:4px}
    .viewer-actions{display:flex;gap:10px;justify-content:flex-end;align-items:center;margin-top:20px;padding-top:20px;border-top:1px solid #f1f5f9;flex-wrap:wrap}
    .copy-correction-btn{padding:8px 14px;font-size:13px}
    .copy-correction-btn[disabled]{opacity:.6;cursor:default}
    .claim-card{width:100%;text-align:left;border:1px solid var(--border);background:#fff;border-radius:20px;padding:16px;margin-bottom:12px;cursor:pointer;transition:.15s;box-shadow:none}
    .claim-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
    .claim-card.active{border-color:transparent;box-shadow:0 0 0 2px currentColor inset}
    .claim-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:8px}
    .claim-id{font-size:14px;font-weight:700}
    .claim-text{font-size:14px;line-height:1.6;margin-bottom:8px}
    .claim-snippet{font-size:12px;color:var(--muted);line-height:1.5}
    .pill{display:inline-flex;align-items:center;border:1px solid transparent;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
    .overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
    .overlay.open{display:flex}
    .modal{width:min(100%,1024px);max-height:88vh;overflow:hidden;background:#fff;border:1px solid var(--border);border-radius:30px;box-shadow:0 24px 80px rgba(15,23,42,.25)}
    .modal-header{display:flex;justify-content:space-between;gap:16px;padding:20px 24px;border-bottom:1px solid #f1f5f9}
    .close-btn{border:1px solid var(--border);background:#fff;border-radius:999px;padding:10px;cursor:pointer}
    .close-btn:hover{background:#f8fafc}
    .tabs{padding:12px 24px;border-bottom:1px solid #f1f5f9;display:flex;gap:8px;flex-wrap:wrap}
    .tab{border:1px solid var(--border);background:#fff;border-radius:999px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
    .modal-scroll{overflow:auto;max-height:70vh;padding:24px}
    .modal-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:20px}
    .card{border:1px solid var(--border);border-radius:24px;padding:20px;background:#fff}
    .card.soft{background:#f8fafc}
    .label{margin-bottom:8px;font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    blockquote{margin:0;border-left:4px solid #e2e8f0;padding-left:16px;white-space:pre-wrap;font-size:14px;line-height:1.8}
    .source-quotes{display:flex;flex-direction:column;gap:10px}
    .source-quote-card{border:1px solid var(--border);background:#f8fafc;border-radius:18px;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
    .source-quote-card:hover{background:#fff}
    .source-quote-card blockquote{margin:0;border-left:4px solid #e2e8f0;padding-left:14px;font-size:14px;line-height:1.7;white-space:pre-wrap;color:#1f2937}
    .source-quote-foot{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .source-quote-link{display:flex;align-items:center;gap:8px;text-decoration:none;color:inherit;font-weight:500;flex:1;min-width:0}
    .source-quote-link span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .source-quote-link:hover{color:#1d4ed8}
    .copy-url-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;color:var(--muted);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
    .copy-url-btn:hover{background:#fff;color:#111827}
    .copy-url-btn.copied{color:#16a34a;border-color:#16a34a}
    .empty{border:1px dashed var(--border);background:#f8fafc;border-radius:18px;padding:16px;color:var(--muted);font-size:14px;line-height:1.6}
    .correction-box{border:1px solid #fcd34d;background:#fef3c7;border-left:4px solid #f59e0b;border-radius:18px;padding:14px 16px;font-size:14px;line-height:1.6}
    .correction-box .correction-label{font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:#92400e;margin-bottom:8px}
    .correction-box .correction-body{color:#1f2937;line-height:1.7}
    .correction-box s{color:#6b7280}
    .correction-box strong{color:#111827;font-weight:700}
    .correction-box a{color:#1d4ed8;text-decoration:underline}
    .correction-box a:hover{color:#1e3a8a}
    .icon{width:18px;height:18px;display:inline-block;vertical-align:middle}
    .icon-sm{width:16px;height:16px}
    .header-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
    .section-note{margin:6px 0 0;color:var(--muted);font-size:14px}
    .top-link-wrap{margin-bottom:14px}
    .top-link-btn{text-decoration:none}
    .top-link-btn:hover{text-decoration:none}
    @media (max-width: 980px){
      .layout,.modal-grid{grid-template-columns:1fr}
      .resizer{display:none}
      .metrics{min-width:0;width:100%}
      h1{font-size:34px}
    }
    /* Loader screen */
    .loader-wrap{max-width:760px;margin:48px auto;padding:0 16px}
    .loader-panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:32px}
    .loader-panel h1{font-size:28px;margin-bottom:8px}
    .loader-panel .sub{margin:0 0 24px}
    .privacy-note{display:flex;gap:10px;align-items:flex-start;background:var(--green-soft);color:var(--green-text);border:1px solid var(--green-pill);border-radius:14px;padding:12px 14px;font-size:13px;line-height:1.5;margin-bottom:24px}
    .drop-zone{border:2px dashed var(--border);border-radius:18px;padding:24px;text-align:center;background:#f8fafc;transition:.15s;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
    .drop-zone:hover, .drop-zone.dragover{border-color:#94a3b8;background:#f1f5f9}
    .drop-zone strong{display:block;margin-bottom:4px;font-size:15px}
    .drop-zone span{color:var(--muted);font-size:13px;white-space:nowrap}
    .or-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}
    .or-divider::before, .or-divider::after{content:"";flex:1;height:1px;background:var(--border)}
    textarea.paste-box{width:100%;min-height:180px;padding:14px;border-radius:14px;border:1px solid var(--border);background:#f8fafc;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:13px;line-height:1.5;outline:none;resize:vertical}
    textarea.paste-box:focus{background:#fff;box-shadow:0 0 0 4px #e2e8f0}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:14px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
    .btn:hover{background:#f8fafc}
    .btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
    .btn-primary:hover{background:#1e293b}
    .btn-gray{background:#e2e8f0;color:#0f172a;border-color:#cbd5e1}
    .btn-gray:hover{background:#cbd5e1}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .actions-row{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
    .err{margin-top:14px;padding:12px 14px;border-radius:12px;background:var(--red-soft);color:var(--red-text);border:1px solid var(--red-pill);font-size:13px;display:none}
    .err.show{display:block}
    .reload-bar{position:fixed;bottom:20px;right:20px;z-index:10}
    .reload-bar .btn{box-shadow:var(--shadow)}
    details.help{margin-top:20px;font-size:13px;color:var(--muted)}
    details.help summary{cursor:pointer;font-weight:600;color:var(--text)}
    details.help pre{background:#f1f5f9;padding:12px;border-radius:10px;overflow:auto;font-size:12px;margin-top:8px}
    .viewer-wrap{position:relative}
    .inline-detail{position:absolute;inset:0;background:#fff;border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);z-index:5;overflow:hidden}
    .inline-detail .modal-scroll{max-height:calc(100vh - 250px)}
    .claim-highlight.checked{opacity:.45}
    @media (max-width: 980px){
      .inline-detail{position:fixed;left:16px;right:16px;top:16px;bottom:16px;border-radius:20px}
      .inline-detail .modal-scroll{max-height:none;height:calc(100% - 72px)}
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="overlay" class="overlay" aria-hidden="true"></div>
  <div id="reloadBar" class="reload-bar" style="display:none">
    <button id="reloadBtn" class="btn">Load different document</button>
  </div>

  <script>
    /* ---------- Loader: parse a pasted/uploaded factCheckDocument ---------- */
    (function loaderInit() {
      const SUGGESTED_PROMPT_URL = "https://docs.google.com/document/d/1cKT74QdTjQr-zsw7hpkfgsYhcX43LAEyRURAM2zUiJg/";
      const exampleDocument = {
        title: "Example fact-check document",
        subtitle: "Demo content to preview the interface",
        description: "Use this sample to explore highlights, claims, and sources.",
        passageHeading: "Original passage",
        claimsHeading: "Claims index",
        passage: "A short example passage.",
        segments: [
          { text: "City records show that " },
          { text: "the bridge opened in 2018", claimIds: ["C1"], verdict: "green" },
          { text: ", while officials said " },
          { text: "it came in under budget", claimIds: ["C2"], verdict: "yellow" },
          { text: ". The speech also claimed that " },
          { text: "ridership doubled in the first year", claimIds: ["C3"], verdict: "red" },
          { text: "." }
        ],
        claims: [
          {
            id: "C1",
            claim: "The bridge opened in 2018.",
            verdict: "green",
            check: "Construction and opening records confirm a 2018 opening date.",
            snippet: "the bridge opened in 2018",
            sources: [{
              title: "Example city release",
              url: "https://example.com/source-1",
              quote: "Public records list the opening ceremony in September 2018."
            }]
          },
          {
            id: "C2",
            claim: "The bridge came in under budget.",
            verdict: "yellow",
            check: "Available reports show mixed estimates; final audited numbers are unclear.",
            snippet: "it came in under budget",
            correction: "~came in under budget~ *final cost is still pending audit* -- public reports do not yet confirm the final number [Example budget report](https://example.com/source-2)",
            sources: [{
              title: "Example budget report",
              url: "https://example.com/source-2",
              quote: "The final accounting is pending external audit."
            }]
          },
          {
            id: "C3",
            claim: "Ridership doubled in the first year.",
            verdict: "red",
            check: "Transit statistics indicate growth, but not a doubling year-over-year.",
            sourceQuote: "Ridership increased 32% compared to the prior year.",
            snippet: "ridership doubled in the first year",
            correction: "~doubled~ *grew about 32%* in the first year -- transit data shows a 32% rise, not a doubling [Example transit data](https://example.com/source-3)",
            sources: [{ title: "Example transit data", url: "https://example.com/source-3" }]
          }
        ],
        legend: {
          green: "directly confirmed",
          yellow: "check / clarification needed",
          blue: "quote verification needed"
        }
      };

      const app = document.getElementById("app");
      const reloadBar = document.getElementById("reloadBar");
      const reloadBtn = document.getElementById("reloadBtn");

      function showLoader() {
        reloadBar.style.display = "none";
        app.innerHTML = `
          <div class="loader-wrap">
            <div class="loader-panel">
              <h1>Fact-check viewer</h1>
              <p class="sub">Load a <code>factCheckDocument</code> to view it. Your file is parsed in your browser and is never uploaded anywhere.</p>
              <div class="top-link-wrap">
                <a class="btn top-link-btn" href="${SUGGESTED_PROMPT_URL}" target="_blank" rel="noreferrer">Suggested fact checking prompt</a>
              </div>

              <div class="privacy-note">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4Z"/><path d="m9 12 2 2 4-4"/></svg>
                <span><strong>Stays on your device.</strong> This page has no server. The file is read with the browser's FileReader API and parsed locally.</span>
              </div>

              <textarea id="pasteBox" class="paste-box" placeholder='Paste either:&#10;&#10;  window.factCheckDocument = { "title": "...", "claims": [...] };&#10;&#10;or just the JSON object:&#10;&#10;  { "title": "...", "claims": [...] }'></textarea>

              <div class="actions-row">
                <button id="loadBtn" class="btn btn-primary">Load document</button>
                <button id="clearBtn" class="btn">Clear</button>
                <button id="exampleBtn" class="btn btn-gray">Example document</button>
              </div>

              <div class="or-divider">or drop a file</div>

              <label for="fileInput" class="drop-zone" id="dropZone">
                <strong>Drop a file here, or click to choose</strong>
                <span>drop a factCheckDocument.json or .js file here</span>
                <input id="fileInput" type="file" accept=".js,.json,application/json,text/javascript" style="display:none" />
              </label>

              <div id="err" class="err"></div>

              <details class="help">
                <summary>Expected format</summary>
                <p>The document needs at least a <code>title</code> and a <code>claims</code> array. Each claim has an <code>id</code>, <code>claim</code>, <code>verdict</code> (green/yellow/red/blue/purple), and a <code>check</code> field. Example:</p>
                <pre>window.factCheckDocument = {
  "title": "My fact-check",
  "subtitle": "...",
  "passage": "The original text...",
  "claims": [
    {
      "id": "C1",
      "claim": "Some claim from the passage",
      "verdict": "green",
      "check": "What I found when checking it",
      "sources": [{ "label": "NYT", "url": "https://..." }]
    }
  ]
}</pre>
              </details>
            </div>
          </div>
        `;

        const fileInput = document.getElementById("fileInput");
        const dropZone = document.getElementById("dropZone");
        const pasteBox = document.getElementById("pasteBox");
        const loadBtn = document.getElementById("loadBtn");
        const clearBtn = document.getElementById("clearBtn");
        const exampleBtn = document.getElementById("exampleBtn");
        const errEl = document.getElementById("err");

        function showError(msg) {
          errEl.textContent = msg;
          errEl.classList.add("show");
        }
        function clearError() {
          errEl.classList.remove("show");
          errEl.textContent = "";
        }

        function parseAndBoot(text) {
          clearError();
          let data = null;

          // Try 1: pure JSON
          try {
            data = JSON.parse(text);
          } catch (_) { /* not JSON, try as JS */ }

          // Try 2: a JS file that assigns window.factCheckDocument = {...}
          if (!data) {
            try {
              const sandbox = { window: {} };
              // Function-based eval: runs in its own scope, no access to outer vars
              // Note: still executes JS, so users should only paste their own files.
              const fn = new Function("window", text + "\nreturn window.factCheckDocument;");
              data = fn(sandbox.window);
              if (!data && sandbox.window.factCheckDocument) {
                data = sandbox.window.factCheckDocument;
              }
            } catch (e) {
              showError("Could not parse the file: " + e.message);
              return;
            }
          }

          if (!data || typeof data !== "object") {
            showError("Parsed, but no document found. Make sure the file sets window.factCheckDocument or is valid JSON.");
            return;
          }
          if (!Array.isArray(data.claims)) {
            showError("The document is missing a 'claims' array.");
            return;
          }

          window.factCheckDocument = data;
          bootViewer();
        }

        function loadFromHash() {
          const hash = window.location.hash || "";
          const m = hash.match(/(?:^#|[#&])data_b64=([^&]+)/);
          if (!m) return { handled: false };
          try {
            let b64 = decodeURIComponent(m[1]).replace(/-/g, "+").replace(/_/g, "/");
            while (b64.length % 4) b64 += "=";
            const bin = atob(b64);
            const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
            const data = JSON.parse(new TextDecoder("utf-8").decode(bytes));
            if (!data || typeof data !== "object") throw new Error("not an object");
            if (!Array.isArray(data.claims)) throw new Error("missing 'claims' array");
            window.factCheckDocument = data;
            bootViewer();
            return { handled: true, ok: true };
          } catch (e) {
            return { handled: true, ok: false, error: e.message };
          }
        }

        function readFile(file) {
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => parseAndBoot(String(reader.result || ""));
          reader.onerror = () => showError("Could not read the file.");
          reader.readAsText(file);
        }

        loadBtn.addEventListener("click", () => {
          const text = pasteBox.value.trim();
          if (!text) { showError("Paste your factCheckDocument first, or choose a file."); return; }
          parseAndBoot(text);
        });
        clearBtn.addEventListener("click", () => { pasteBox.value = ""; clearError(); });
        exampleBtn.addEventListener("click", () => {
          pasteBox.value = JSON.stringify(exampleDocument, null, 2);
          clearError();
          pasteBox.focus();
          pasteBox.scrollTop = 0;
        });

        fileInput.addEventListener("change", (e) => readFile(e.target.files[0]));

        ["dragenter","dragover"].forEach(ev => dropZone.addEventListener(ev, (e) => {
          e.preventDefault(); e.stopPropagation(); dropZone.classList.add("dragover");
        }));
        ["dragleave","drop"].forEach(ev => dropZone.addEventListener(ev, (e) => {
          e.preventDefault(); e.stopPropagation(); dropZone.classList.remove("dragover");
        }));
        dropZone.addEventListener("drop", (e) => {
          const file = e.dataTransfer.files && e.dataTransfer.files[0];
          if (file) readFile(file);
        });
      }

      reloadBtn.addEventListener("click", () => {
        window.factCheckDocument = null;
        if (location.hash) history.replaceState(null, "", location.pathname + location.search);
        showLoader();
      });

      // Boot path: if a factCheckDocument.js was placed next to index.html
      // (the original local-folder workflow), use it. Otherwise show the loader.
      window.__bootViewer = bootViewer;
      window.__showLoader = showLoader;

      const hashResult = loadFromHash();
      if (hashResult.handled && hashResult.ok) {
        // booted via hash
      } else if (window.factCheckDocument) {
        bootViewer();
      } else {
        showLoader();
        if (hashResult.handled && !hashResult.ok) {
          showError("Could not load document from URL: " + hashResult.error);
        }
      }
    })();

    /* ---------- Original viewer (unchanged behaviour) ---------- */
    function bootViewer() {
      const doc = window.factCheckDocument;
      const app = document.getElementById("app");
      const overlay = document.getElementById("overlay");
      const reloadBar = document.getElementById("reloadBar");

      if (!doc) {
        if (window.__showLoader) window.__showLoader();
        return;
      }
      reloadBar.style.display = "block";

      const verdictStyles = {
        green: { pill: "background:var(--green-pill);color:var(--green-text);border-color:#a7f3d0", bg: "background:var(--green-bg);color:var(--green-text)", soft: "background:var(--green-soft);color:var(--green-text)" },
        yellow:{ pill: "background:var(--yellow-pill);color:var(--yellow-text);border-color:#fcd34d", bg: "background:var(--yellow-bg);color:var(--yellow-text)", soft: "background:var(--yellow-soft);color:var(--yellow-text)" },
        red:   { pill: "background:var(--red-pill);color:var(--red-text);border-color:#fda4af", bg: "background:var(--red-bg);color:var(--red-text)", soft: "background:var(--red-soft);color:var(--red-text)" },
        blue:  { pill: "background:var(--blue-pill);color:var(--blue-text);border-color:#7dd3fc", bg: "background:var(--blue-bg);color:var(--blue-text)", soft: "background:var(--blue-soft);color:var(--blue-text)" },
        purple:{ pill: "background:var(--purple-pill);color:var(--purple-text);border-color:#c4b5fd", bg: "background:var(--purple-bg);color:var(--purple-text)", soft: "background:var(--purple-soft);color:var(--purple-text)" }
      };

      const state = {
        query: "",
        selectedIds: null,
        activeId: null,
        checkedIds: new Set(),
        splitPct: 50,
      };

      function esc(s) {
        return String(s ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
      }

      function renderCorrection(md) {
        let s = esc(md);
        s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g,
          (_, label, url) => '<a href="' + url + '" target="_blank" rel="noopener noreferrer">' + label + '</a>');
        s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        s = s.replace(/\*([^*]+)\*/g, "<strong>$1</strong>");
        s = s.replace(/~([^~]+)~/g, "<s>$1</s>");
        return s;
      }

      function iconExternal() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>';
      }
      function iconSearch() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>';
      }
      function iconShield() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l7 4v5c0 5-3.5 8.5-7 9-3.5-.5-7-4-7-9V7l7-4Z"/><path d="m9 12 2 2 4-4"/></svg>';
      }
      function iconQuote() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 11H6a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1"/><path d="M20 11h-4a2 2 0 0 0-2 2v1a4 4 0 0 0 4 4h1"/><path d="M8 11V7a4 4 0 0 1 4-4"/><path d="M18 11V7a4 4 0 0 1 4-4"/></svg>';
      }
      function iconHelp() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9.09 9a3 3 0 1 1 5.82 1c0 2-3 2-3 4"/><path d="M12 17h.01"/></svg>';
      }
      function iconCopy() {
        return '<svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
      }

      function renderSourceQuotes(claim) {
        const sources = Array.isArray(claim.sources) ? claim.sources : [];
        const anyQuotes = sources.some(s => s && s.quote);
        const legacyQuote = !anyQuotes && claim.sourceQuote ? String(claim.sourceQuote) : "";
        if (!sources.length && !legacyQuote) {
          return '<div class="empty">No directly linkable public source was located for this exact claim.</div>';
        }
        const cards = [];
        if (legacyQuote) {
          cards.push(
            '<div class="source-quote-card">' +
              '<blockquote>' + esc(legacyQuote) + '</blockquote>' +
            '</div>'
          );
        }
        for (const s of sources) {
          if (!s || !s.url) continue;
          const url = esc(s.url);
          const title = esc(s.title || s.url);
          const quote = s.quote ? '<blockquote>' + esc(s.quote) + '</blockquote>' : "";
          cards.push(
            '<div class="source-quote-card">' +
              quote +
              '<div class="source-quote-foot">' +
                '<a class="source-quote-link" href="' + url + '" target="_blank" rel="noreferrer">' +
                  '<span>' + title + '</span>' + iconExternal() +
                '</a>' +
                '<button class="copy-url-btn" data-copy-url="' + url + '" title="Copy URL" aria-label="Copy URL">' +
                  iconCopy() +
                '</button>' +
              '</div>' +
            '</div>'
          );
        }
        return '<div class="source-quotes">' + cards.join("") + '</div>';
      }

      function pill(verdict) {
        return '<span class="pill" style="' + verdictStyles[verdict].pill + '">' + esc(verdict) + '</span>';
      }

      function claimMap() {
        return Object.fromEntries((doc.claims || []).map(c => [c.id, c]));
      }

      function counts() {
        const out = { green:0, yellow:0, red:0, blue:0, purple:0 };
        (doc.claims || []).forEach(c => { out[c.verdict] = (out[c.verdict] || 0) + 1; });
        return out;
      }

      function filteredClaims() {
        const q = state.query.trim().toLowerCase();
        if (!q) return doc.claims || [];
        return (doc.claims || []).filter(claim =>
          [claim.id, claim.claim, claim.check, claim.snippet || "", claim.verdict].join(" ").toLowerCase().includes(q)
        );
      }

      function render() {
        const cm = claimMap();
        const cts = counts();
        const claims = filteredClaims();

        app.innerHTML = `
          <div class="page">
            <div class="panel hero">
              <div class="hero-top">
                <div class="hero-grid">
                  <div style="max-width:760px">
                    <div class="eyebrow">${iconShield()} ${esc(doc.subtitle || "Sentence-by-sentence / clause-by-clause fact check")}</div>
                    <h1 style="margin-top:12px">${esc(doc.title)}</h1>
                    ${doc.description ? `<p class="sub">${esc(doc.description)}</p>` : ""}
                  </div>
                  <div class="metrics">
                    <div class="metric" style="${verdictStyles.green.soft}"><div class="num">${cts.green}</div><div class="label">Confirmed</div></div>
                    <div class="metric" style="${verdictStyles.yellow.soft}"><div class="num">${cts.yellow}</div><div class="label">Needs check</div></div>
                    <div class="metric" style="${verdictStyles.blue.soft}"><div class="num">${cts.blue}</div><div class="label">Quote-check</div></div>
                    <div class="metric" style="${verdictStyles.red.soft}"><div class="num">${cts.red}</div><div class="label">Wrong</div></div>
                  </div>
                </div>
              </div>
              <div class="badge-row">
                ${pill("green")} <span>${esc(doc.legend?.green || "directly confirmed")}</span>
                ${pill("yellow")} <span>${esc(doc.legend?.yellow || "check / clarification needed")}</span>
                ${pill("blue")} <span>${esc(doc.legend?.blue || "exact quote needs transcript or original recording")}</span>
                ${pill("red")} <span>${esc(doc.legend?.red || "incorrect or contradicted")}</span>
                ${cts.purple > 0 ? `${pill("purple")} <span>${esc(doc.legend?.purple || "opinion or interpretation")}</span>` : ""}
              </div>
            </div>

            <div class="layout viewer-wrap">
              <section class="panel section">
                <h2>${esc(doc.passageHeading || "Original passage")}</h2>
                <p class="section-note">The prose remains continuous; only the claim-bearing language is color-coded.</p>
                <div class="passage-box" style="margin-top:20px">
                  ${(doc.segments && doc.segments.length)
                    ? `<p class="passage">
                        ${doc.segments.map((segment) => {
                          if (!segment.claimIds || !segment.verdict) return esc(segment.text);
                          const title = segment.claimIds.map(id => `#${id}: ${cm[id]?.claim || ""}`).join("\\n\\n");
                          const checkedClass = segment.claimIds.some(id => state.checkedIds.has(id)) ? " checked" : "";
                          return `<button class="claim-highlight${checkedClass}" data-claim-ids="${segment.claimIds.join(",")}" title="${esc(title)}" style="${verdictStyles[segment.verdict].bg}">${esc(segment.text)}</button>`;
                        }).join("")}
                      </p>`
                    : `<div class="passage" style="white-space:pre-wrap">${esc(doc.passage || "")}</div>`}
                </div>
                <div class="viewer-actions">
                  <button id="resetFactCheckBtn" class="btn">Reset fact check</button>
                  <button id="newFactCheckBtn" class="btn">New fact check</button>
                </div>
              </section>

              <div class="resizer" id="paneResizer" role="separator" aria-orientation="vertical" aria-label="Resize panes" tabindex="0"></div>

              <aside class="panel section">
                <h2>${esc(doc.claimsHeading || "Claims index")}</h2>
                <p class="section-note">Filter by any word, verdict color, or claim number.</p>
                <div class="search-wrap" style="margin-top:20px">
                  <span class="search-icon">${iconSearch()}</span>
                  <input id="searchInput" class="search" value="${esc(state.query)}" placeholder="${esc(doc.claimsFilterPlaceholder || "Search claims")}" />
                </div>
                <div class="claims-list">
                  ${claims.map(claim => {
                    const active = state.activeId === claim.id && state.selectedIds && state.selectedIds.includes(claim.id);
                    return `<button class="claim-card${active ? " active" : ""}" data-open-claim="${esc(claim.id)}" style="${active ? verdictStyles[claim.verdict].soft : ""}">
                      <div class="claim-top">
                        <div class="claim-id">Claim ${esc(claim.id)}</div>
                        ${pill(claim.verdict)}
                      </div>
                      <div class="claim-text">${esc(claim.claim)}</div>
                      ${claim.snippet ? `<div class="claim-snippet">Passage: ${esc(claim.snippet)}</div>` : ""}
                    </button>`;
                  }).join("")}
                </div>
              </aside>
            </div>
          </div>
        `;

        app.style.setProperty("--split-pct", state.splitPct);
        const layoutEl = app.querySelector(".layout");
        if (layoutEl) layoutEl.style.setProperty("--split-pct", state.splitPct);

        const searchInput = document.getElementById("searchInput");
        if (state.searchFocus != null) {
          searchInput.focus();
          const pos = state.searchFocus;
          try { searchInput.setSelectionRange(pos, pos); } catch (_) { /* some input types reject this */ }
          state.searchFocus = null;
        }
        searchInput.addEventListener("input", (e) => {
          state.query = e.target.value;
          state.searchFocus = e.target.selectionStart;
          render();
        });

        document.getElementById("resetFactCheckBtn").addEventListener("click", () => {
          state.checkedIds.clear();
          closeModal();
        });
        document.getElementById("newFactCheckBtn").addEventListener("click", () => {
          window.factCheckDocument = null;
          if (window.__showLoader) window.__showLoader();
        });

        app.querySelectorAll("[data-open-claim]").forEach(el => {
          el.addEventListener("click", () => openClaims([el.getAttribute("data-open-claim")]));
        });
        app.querySelectorAll("[data-claim-ids]").forEach(el => {
          el.addEventListener("click", () => openClaims(el.getAttribute("data-claim-ids").split(",")));
        });

        const resizer = document.getElementById("paneResizer");
        if (resizer && layoutEl) {
          const onMove = (e) => {
            const rect = layoutEl.getBoundingClientRect();
            const pct = ((e.clientX - rect.left) / rect.width) * 100;
            state.splitPct = Math.max(25, Math.min(75, pct));
            layoutEl.style.setProperty("--split-pct", state.splitPct);
          };
          const onUp = (e) => {
            resizer.classList.remove("dragging");
            document.body.classList.remove("resizing");
            window.removeEventListener("pointermove", onMove);
            window.removeEventListener("pointerup", onUp);
            try { resizer.releasePointerCapture(e.pointerId); } catch (_) {}
          };
          resizer.addEventListener("pointerdown", (e) => {
            e.preventDefault();
            resizer.classList.add("dragging");
            document.body.classList.add("resizing");
            try { resizer.setPointerCapture(e.pointerId); } catch (_) {}
            window.addEventListener("pointermove", onMove);
            window.addEventListener("pointerup", onUp);
          });
          resizer.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") {
              e.preventDefault();
              const delta = e.key === "ArrowLeft" ? -2 : 2;
              state.splitPct = Math.max(25, Math.min(75, state.splitPct + delta));
              layoutEl.style.setProperty("--split-pct", state.splitPct);
            }
          });
          resizer.addEventListener("dblclick", () => {
            state.splitPct = 50;
            layoutEl.style.setProperty("--split-pct", state.splitPct);
          });
        }

        renderModal();
      }

      function openClaims(ids) {
        state.selectedIds = ids;
        state.activeId = ids[0];
        ids.forEach(id => state.checkedIds.add(id));
        render();
      }

      function closeModal() {
        state.selectedIds = null;
        state.activeId = null;
        render();
      }

      function renderModal() {
        const cm = claimMap();
        const modalClaims = state.selectedIds ? state.selectedIds.map(id => cm[id]).filter(Boolean) : [];
        const activeClaim = state.activeId ? cm[state.activeId] : null;

        if (!state.selectedIds || !activeClaim) {
          overlay.className = "overlay";
          overlay.innerHTML = "";
          overlay.onclick = null;
          return;
        }

        overlay.className = "overlay";
        const asideSection = app.querySelector(".layout aside.section");
        if (!asideSection) return;
        asideSection.style.position = "relative";
        const existing = asideSection.querySelector(".inline-detail");
        if (existing) existing.remove();
        asideSection.insertAdjacentHTML("beforeend", `
          <div class="inline-detail" role="dialog" aria-modal="false" aria-label="Claim detail">
            <div class="modal-header">
              <div>
                <div class="header-row">${pill(activeClaim.verdict)} <span class="muted" style="font-size:14px;font-weight:600">Claim ${esc(activeClaim.id)}</span></div>
                <h3>${esc(activeClaim.claim)}</h3>
              </div>
              <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
                <button class="btn btn-primary copy-correction-btn" id="copyCorrectionBtn">
                  ${activeClaim.correction ? "Copy correction" : "Copy quote"}
                </button>
                <button class="close-btn" id="closeModal" aria-label="Close">✕</button>
              </div>
            </div>

            ${modalClaims.length > 1 ? `<div class="tabs">
              ${modalClaims.map(claim => `<button class="tab" data-tab-id="${esc(claim.id)}" style="${claim.id === state.activeId ? verdictStyles[claim.verdict].pill : ""}">Claim ${esc(claim.id)}</button>`).join("")}
            </div>` : ""}

            <div class="modal-scroll">
              <div class="modal-grid">
                <div style="display:flex;flex-direction:column;gap:20px">
                  <div class="card soft">
                    <div class="label">Claim</div>
                    <div style="font-size:16px;line-height:1.8">${esc(activeClaim.claim)}</div>
                  </div>

                  <div class="card" style="${verdictStyles[activeClaim.verdict].soft}">
                    <div class="label">${iconHelp()} Check</div>
                    <div style="font-size:14px;line-height:1.8">${esc(activeClaim.check)}</div>
                  </div>

                  ${activeClaim.correction ? `
                    <div class="correction-box">
                      <div class="correction-label">Proposed correction</div>
                      <div class="correction-body">${renderCorrection(activeClaim.correction)}</div>
                    </div>` : ""}
                </div>

                <div style="display:flex;flex-direction:column;gap:20px">
                  <div class="card">
                    <div class="label">${iconQuote()} Source quotes</div>
                    ${renderSourceQuotes(activeClaim)}
                  </div>
                </div>
              </div>
            </div>
          </div>
        `);

        document.getElementById("closeModal").onclick = closeModal;

        asideSection.querySelectorAll(".copy-url-btn").forEach(btn => {
          btn.addEventListener("click", async (e) => {
            e.preventDefault();
            e.stopPropagation();
            const url = btn.getAttribute("data-copy-url");
            if (!url) return;
            try {
              await navigator.clipboard.writeText(url);
              btn.classList.add("copied");
              setTimeout(() => btn.classList.remove("copied"), 1200);
            } catch (_) { /* noop */ }
          });
        });

        const copyCorrectionBtn = document.getElementById("copyCorrectionBtn");
        if (copyCorrectionBtn) {
          copyCorrectionBtn.addEventListener("click", async () => {
            const text = activeClaim.correction || activeClaim.snippet || activeClaim.claim || "";
            if (!text) return;
            const orig = copyCorrectionBtn.textContent;
            try {
              await navigator.clipboard.writeText(text);
              copyCorrectionBtn.textContent = "Copied";
            } catch (_) {
              copyCorrectionBtn.textContent = "Copy failed";
            }
            copyCorrectionBtn.disabled = true;
            setTimeout(() => {
              copyCorrectionBtn.textContent = orig;
              copyCorrectionBtn.disabled = false;
            }, 1500);
          });
        }
        asideSection.querySelectorAll("[data-tab-id]").forEach(el => {
          el.addEventListener("click", () => {
            state.activeId = el.getAttribute("data-tab-id");
            renderModal();
          });
        });
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape" && state.selectedIds) closeModal();
      });

      render();
    }
  </script>
</body>
</html>
